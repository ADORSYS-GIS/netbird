---
# Main Ansible playbook for deploying NetBird with Caddy as a reverse proxy.
# This playbook orchestrates the entire deployment process, including system preparation
# and the deployment of NetBird services with Caddy.

- name: Deploy NetBird with Caddy Reverse Proxy
  hosts: netbird_servers
  become: true
  gather_facts: false
  vars:
    # Force remote temp directory to /tmp to avoid issues with restricted home directories (especially on AWS SSM)
    ansible_remote_tmp: /tmp
    ansible_system_tmpdirs: [/tmp]
    ansible_aws_ssm_shell: sh
    ansible_shell_type: sh

  tasks:
    - name: Gather facts if not cleanup
      ansible.builtin.setup:
      when: "'cleanup' not in ansible_run_tags"
      tags: [always]

    # Pre-flight Checklist: Install Docker if missing
    - name: Pre-flight | Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_installed
      ignore_errors: true
      changed_when: false

    - name: Pre-flight | Install Docker and dependencies
      when: docker_installed.rc != 0
      block:
        - name: Install | Update apt cache
          ansible.builtin.apt:
            update_cache: true
          register: apt_update
          until: apt_update is success
          retries: 10
          delay: 10

        - name: Install | Install required packages
          ansible.builtin.apt:
            name:
              - apt-transport-https
              - ca-certificates
              - curl
              - gnupg
              - lsb-release
              - python3-pip
            state: present
          register: apt_install_req
          until: apt_install_req is success
          retries: 10
          delay: 10

        - name: Install | Add Docker GPG key
          ansible.builtin.apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present

        - name: Install | Add Docker repository
          ansible.builtin.apt_repository:
            repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
            state: present

        - name: Install | Install Docker Engine
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
            update_cache: true
          register: apt_install_docker
          until: apt_install_docker is success
          retries: 10
          delay: 10

        - name: Install | Ensure Docker service is started
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
      when: docker_installed.rc != 0

    - name: Pre-flight | Check if Docker is running
      ansible.builtin.command: docker info
      register: docker_check
      changed_when: false
      failed_when: docker_check.rc != 0

    - name: Pre-flight | Check if Keycloak configuration is needed
      ansible.builtin.set_fact:
        run_keycloak_config: >-
          {{
            keycloak_auto_setup | default(true) and
            (netbird_idp_mgmt_client_secret | default('') == '<YOUR_IDP_MGMT_CLIENT_SECRET>' or netbird_idp_mgmt_client_secret | default('') == '') and
            not keycloak_domain.startswith('<YOUR_')
          }}

    - name: Pre-flight | Variable Sanitization and Finalization
      ansible.builtin.set_fact:
        nb_management_secret: >-
          {{ (netbird_management_secret | default('') == '' or netbird_management_secret.startswith('<YOUR_') or netbird_management_secret | length < 43 or
          not netbird_management_secret.endswith('=')) | ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=32') | b64encode, netbird_management_secret) }}
        nb_relay_secret: >-
          {{ (netbird_relay_secret | default('') == '' or netbird_relay_secret.startswith('<YOUR_') or netbird_relay_secret | length < 43 or
          not netbird_relay_secret.endswith('=')) | ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=32') | b64encode, netbird_relay_secret) }}
        nb_turn_secret: >-
          {{ (netbird_turn_secret | default('') == '' or netbird_turn_secret.startswith('<YOUR_') or netbird_turn_secret | length < 43 or
          not netbird_turn_secret.endswith('=')) | ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=32') | b64encode, netbird_turn_secret) }}
        nb_turn_password: >-
          {{ (netbird_turn_password | default('') == '' or netbird_turn_password.startswith('<YOUR_') or
          netbird_turn_password | length < 12) | ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=24'), netbird_turn_password) }}
        nb_datastore_encryption_key: >-
          {{ (netbird_datastore_encryption_key | default('') == '' or netbird_datastore_encryption_key.startswith('<YOUR_') or netbird_datastore_encryption_key | length < 43 or
          not netbird_datastore_encryption_key.endswith('=')) | ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=32') | b64encode, netbird_datastore_encryption_key) }}
        nb_auth_authority: >-
          {{ (netbird_auth_authority | default('') == '' or '<YOUR_' in netbird_auth_authority) |
          ternary('https://' + (keycloak_domain | default('')) + '/realms/' + (netbird_realm | default('netbird')), netbird_auth_authority) }}
        nb_netbird_domain: "{{ (netbird_domain | default('')) | trim | regex_replace('/+$', '') }}"
        nb_caddy_email: >-
          {{ (netbird_caddy_email | default('') == '' or netbird_caddy_email.startswith('<YOUR_')) |
          ternary('admin@' + (netbird_domain | default('')), netbird_caddy_email) }}
        nb_auth_audience: "{{ netbird_auth_audience | default('netbird-client') }}"
        nb_auth_client_id: "{{ netbird_auth_client_id | default('netbird-client') }}"
        nb_idp_mgmt_client_id: "{{ netbird_idp_mgmt_client_id | default('netbird-management') }}"
        nb_idp_mgmt_client_secret: "{{ netbird_idp_mgmt_client_secret | default('') }}"
        nb_netbird_realm: "{{ (netbird_realm | default('netbird')) | trim | regex_replace('^/+', '') | regex_replace('/+$', '') }}"
        nb_keycloak_domain: "{{ (keycloak_domain | default('')) | trim | regex_replace('/+$', '') }}"
        nb_keycloak_admin_user: >-
          {{ (keycloak_admin_user | default('') == '' or keycloak_admin_user.startswith('<YOUR_')) |
          ternary('admin', keycloak_admin_user) }}
        nb_keycloak_admin_password: >-
          {{ (keycloak_admin_password | default('') == '' or keycloak_admin_password.startswith('<YOUR_')) |
          ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=16'), keycloak_admin_password) }}
      tags: [always]

    - name: Pre-flight | Debug Variable Lengths (Sensitive)
      ansible.builtin.debug:
        msg:
          - "Management Secret Length: {{ nb_management_secret | default('') | length }}"
          - "Relay Secret Length: {{ nb_relay_secret | default('') | length }}"
          - "TURN Secret Length: {{ nb_turn_secret | default('') | length }}"
          - "TURN Password Length: {{ nb_turn_password | default('') | length }}"
          - "Datastore Encryption Key Length: {{ nb_datastore_encryption_key | default('') | length }}"
      tags: [debug]
      when:
        - "'cleanup' not in ansible_run_tags"
        - "'always' not in ansible_run_tags"

    - name: Pre-flight | Validate required variables
      ansible.builtin.assert:
        that:
          - netbird_domain is defined and not netbird_domain.startswith('<YOUR_')
          - nb_management_secret | length >= 43 and nb_management_secret.endswith('=')
          - nb_relay_secret | length >= 43 and nb_relay_secret.endswith('=')
          - nb_turn_secret | length >= 43 and nb_turn_secret.endswith('=')
          - nb_turn_password | length >= 12
          - nb_datastore_encryption_key | length >= 43 and nb_datastore_encryption_key.endswith('=')
        fail_msg: "One or more required variables are missing or contain placeholders, and finalization failed. Please check your vars.yml or GitHub Secrets."
      when:
        - "'cleanup' not in ansible_run_tags"
        - "'always' not in ansible_run_tags"

    # Keycloak Configuration
    - name: Configure Keycloak realm and OAuth clients via API
      when: run_keycloak_config | bool
      block:
        - name: Keycloak | Set normalized facts
          ansible.builtin.set_fact:
            keycloak_base_url: "{{ (keycloak_auth_url | default('')) | trim | regex_replace('/+$', '') }}"
            keycloak_realm_name: "{{ (netbird_realm | default('netbird')) | trim | regex_replace('^/+', '') | regex_replace('/+$', '') }}"

        - name: Keycloak | Validate Keycloak admin credentials
          ansible.builtin.assert:
            that:
              - keycloak_admin_user is defined and not keycloak_admin_user.startswith('<YOUR_')
              - keycloak_admin_password is defined and not keycloak_admin_password.startswith('<YOUR_')
            fail_msg: "Keycloak admin credentials are required for automated setup but are missing or placeholders."

        - name: Keycloak | Get admin token
          ansible.builtin.uri:
            url: "{{ keycloak_base_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            body_format: form-urlencoded
            body:
              username: "{{ keycloak_admin_user }}"
              password: "{{ keycloak_admin_password }}"
              grant_type: password
              client_id: admin-cli
            status_code: 200
          register: keycloak_admin_token_response
          no_log: true
          # Retrying in case Keycloak is still starting up
          until: keycloak_admin_token_response.status is defined and keycloak_admin_token_response.status == 200
          retries: 5
          delay: 5

        - name: Keycloak | Set admin token fact
          ansible.builtin.set_fact:
            keycloak_admin_token: "{{ keycloak_admin_token_response.json.access_token }}"

        - name: Keycloak | Check if realm exists
          ansible.builtin.uri:
            url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_realm_check
          failed_when: false
          changed_when: false

        - name: Keycloak | Create realm if it does not exist
          ansible.builtin.uri:
            url: "{{ keycloak_base_url }}/admin/realms"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
            body_format: json
            body:
              realm: "{{ keycloak_realm_name }}"
              enabled: true
              displayName: "NetBird"
            status_code: [201, 409] # 201 Created, 409 Conflict (already exists)
          when: keycloak_realm_check.status == 404

        - name: Keycloak | Create 'api' client scope if it does not exist
          block:
            - name: Keycloak | Check if 'api' scope exists
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/client-scopes"
                method: GET
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
              register: keycloak_scopes_check

            - name: Keycloak | Set 'api' scope UUID if exists
              ansible.builtin.set_fact:
                keycloak_api_scope_uuid: "{{ (keycloak_scopes_check.json | selectattr('name', 'equalto', 'api') | list | first).id if keycloak_scopes_check.json | selectattr('name', 'equalto', 'api') | list | length > 0 else none }}"

            - name: Keycloak | Create 'api' scope
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/client-scopes"
                method: POST
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  name: "api"
                  protocol: "openid-connect"
                  attributes:
                    include.in.token.scope: "true"
                    display.on.consent.screen: "true"
                status_code: 201
              when: keycloak_api_scope_uuid is none

            - name: Keycloak | Get 'api' scope UUID after creation
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/client-scopes"
                method: GET
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
              register: keycloak_scopes_after_create
              when: keycloak_api_scope_uuid is none

            - name: Keycloak | Set 'api' scope UUID fact
              ansible.builtin.set_fact:
                keycloak_api_scope_uuid: "{{ (keycloak_scopes_after_create.json | selectattr('name', 'equalto', 'api') | list | first).id }}"
              when: keycloak_api_scope_uuid is none

        - name: Keycloak | Create or Update netbird-client
          block:
            - name: Keycloak | Check if netbird-client exists
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients?clientId=netbird-client"
                method: GET
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
              register: keycloak_netbird_client_check

            - name: Keycloak | Set client UUID if exists
              ansible.builtin.set_fact:
                keycloak_netbird_client_uuid: "{{ keycloak_netbird_client_check.json[0].id if keycloak_netbird_client_check.json | length > 0 else none }}"

            - name: Keycloak | Create netbird-client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients"
                method: POST
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  clientId: "netbird-client"
                  name: "NetBird Web Client"
                  publicClient: true
                  standardFlowEnabled: true
                  redirectUris:
                    - "https://{{ netbird_domain }}/*"
                    - "https://{{ netbird_domain }}"
                    - "http://localhost:53000/*"
                    - "http://localhost:53000"
                  webOrigins:
                    - "https://{{ netbird_domain }}"
                    - "http://localhost:53000"
                    - "*"
                  attributes:
                    pkce.code.challenge.method: "S256"
                    post.logout.redirect.uris: "+"
                status_code: 201
              when: keycloak_netbird_client_uuid is none

            - name: Keycloak | Update netbird-client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_netbird_client_uuid }}"
                method: PUT
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  clientId: "netbird-client"
                  name: "NetBird Web Client"
                  publicClient: true
                  standardFlowEnabled: true
                  redirectUris:
                    - "https://{{ netbird_domain }}/*"
                    - "https://{{ netbird_domain }}"
                    - "http://localhost:53000/*"
                    - "http://localhost:53000"
                  webOrigins:
                    - "https://{{ netbird_domain }}"
                    - "http://localhost:53000"
                    - "*"
                  attributes:
                    pkce.code.challenge.method: "S256"
                    post.logout.redirect.uris: "+"
                status_code: 204
              when: keycloak_netbird_client_uuid is not none

            - name: Keycloak | Get netbird-client protocol mappers
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_netbird_client_uuid if keycloak_netbird_client_uuid is not none else (keycloak_netbird_client_check.json[0].id if keycloak_netbird_client_check.json | length > 0 else none) }}/protocol-mappers/models"
                method: GET
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
              register: keycloak_client_mappers
              when: (keycloak_netbird_client_uuid is not none) or (keycloak_netbird_client_check.json | length > 0)

            - name: Keycloak | Set client UUID fact if not set
              ansible.builtin.set_fact:
                keycloak_netbird_client_uuid: "{{ keycloak_netbird_client_check.json[0].id }}"
              when: keycloak_netbird_client_uuid is none and keycloak_netbird_client_check.json | length > 0

            - name: Keycloak | Add audience mapper to netbird-client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_netbird_client_uuid }}/protocol-mappers/models"
                method: POST
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  name: "audience"
                  protocol: "openid-connect"
                  protocolMapper: "oidc-audience-mapper"
                  consentRequired: false
                  config:
                    included.client.audience: "netbird-client"
                    id.token.claim: "false"
                    access.token.claim: "true"
                status_code: [201, 409]
              when:
                - keycloak_netbird_client_uuid is not none
                - keycloak_client_mappers.json | selectattr('name', 'equalto', 'audience') | list | length == 0

            - name: Keycloak | Add groups mapper to netbird-client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_netbird_client_uuid }}/protocol-mappers/models"
                method: POST
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  name: "groups"
                  protocol: "openid-connect"
                  protocolMapper: "oidc-group-membership-mapper"
                  consentRequired: false
                  config:
                    full.path: "false"
                    id.token.claim: "true"
                    access.token.claim: "true"
                    claim.name: "groups"
                    userinfo.token.claim: "true"
                status_code: [201, 409]
              when:
                - keycloak_netbird_client_uuid is not none
                - keycloak_client_mappers.json | selectattr('name', 'equalto', 'groups') | list | length == 0

            - name: Keycloak | Assign 'api' scope to netbird-client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_netbird_client_uuid }}/default-client-scopes/{{ keycloak_api_scope_uuid }}"
                method: PUT
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                status_code: [204, 409]
              when:
                - keycloak_netbird_client_uuid is not none
                - keycloak_api_scope_uuid is not none

        - name: Keycloak | Create or Update netbird-management client
          block:
            - name: Keycloak | Check if netbird-management client exists
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients?clientId=netbird-management"
                method: GET
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
              register: keycloak_mgmt_client_check

            - name: Keycloak | Set management client UUID fact if exists
              ansible.builtin.set_fact:
                keycloak_mgmt_client_uuid: "{{ keycloak_mgmt_client_check.json[0].id if keycloak_mgmt_client_check.json | length > 0 else none }}"

            - name: Keycloak | Create netbird-management client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients"
                method: POST
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  clientId: "netbird-management"
                  name: "NetBird Management Service"
                  serviceAccountsEnabled: true
                  publicClient: false
                status_code: 201
              when: keycloak_mgmt_client_uuid is none

            - name: Keycloak | Update netbird-management client
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_mgmt_client_uuid }}"
                method: PUT
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  clientId: "netbird-management"
                  name: "NetBird Management Service"
                  serviceAccountsEnabled: true
                  publicClient: false
                status_code: 204
              when: keycloak_mgmt_client_uuid is not none

            - name: Keycloak | Check if default user exists
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/users?username={{ netbird_default_user | default('admin') }}"
                method: GET
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
              register: keycloak_user_check

            - name: Keycloak | Set default user password fact
              ansible.builtin.set_fact:
                nb_default_password: "{{ (netbird_default_password | default('') == '' or netbird_default_password == '<YOUR_DEFAULT_USER_PASSWORD>') | ternary(lookup('password', '/dev/null chars=ascii_letters,digits length=12'), netbird_default_password) }}"

            - name: Keycloak | Create default user
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/users"
                method: POST
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  username: "{{ netbird_default_user | default('admin') }}"
                  enabled: true
                  emailVerified: true
                  firstName: "NetBird"
                  lastName: "Admin"
                  email: "{{ netbird_default_user | default('admin') }}@{{ netbird_domain }}"
                  credentials:
                    - type: password
                      value: "{{ nb_default_password }}"
                      temporary: false
                status_code: 201
              when: keycloak_user_check.json | length == 0

            - name: Keycloak | Update default user password
              ansible.builtin.uri:
                url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_user_check.json[0].id }}/reset-password"
                method: PUT
                validate_certs: "{{ keycloak_validate_certs }}"
                headers:
                  Authorization: "Bearer {{ keycloak_admin_token }}"
                body_format: json
                body:
                  type: password
                  value: "{{ nb_default_password }}"
                  temporary: false
                status_code: 204
              when:
                - keycloak_user_check.json | length > 0
                - netbird_default_password | default('') != ''
                - netbird_default_password != '<YOUR_DEFAULT_USER_PASSWORD>'

            - name: Keycloak | Debug default user credentials
              ansible.builtin.debug:
                msg:
                  - "Default Admin User: {{ netbird_default_user | default('admin') }}"
                  - "Password Status: {{ (netbird_default_password | default('') == '' or netbird_default_password == '<YOUR_DEFAULT_USER_PASSWORD>') | ternary('GENERATED (Check logs below)', 'CUSTOM (From Secrets/Vars)') }}"
              tags: [always]

            - name: Keycloak | Debug generated password
              ansible.builtin.debug:
                msg: "Generated Password: {{ nb_default_password }}"
              when: (netbird_default_password | default('') == '' or netbird_default_password == '<YOUR_DEFAULT_USER_PASSWORD>')
              tags: [always]

        - name: Keycloak | Refresh admin token
          ansible.builtin.uri:
            url: "{{ keycloak_base_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            body_format: form-urlencoded
            body:
              username: "{{ keycloak_admin_user }}"
              password: "{{ keycloak_admin_password }}"
              grant_type: password
              client_id: admin-cli
            status_code: 200
          register: keycloak_admin_token_refresh
          no_log: true
          tags: [always]

        - name: Keycloak | Update admin token fact
          ansible.builtin.set_fact:
            keycloak_admin_token: "{{ keycloak_admin_token_refresh.json.access_token }}"
          tags: [always]

        - name: Keycloak | Get netbird-management client UUID
          ansible.builtin.uri:
            url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients?clientId=netbird-management"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_mgmt_client_info
          retries: 5
          delay: 2
          until: "keycloak_mgmt_client_info.json | length > 0"

        - name: Keycloak | Set management client UUID fact
          ansible.builtin.set_fact:
            keycloak_mgmt_client_uuid: "{{ keycloak_mgmt_client_info.json[0].id }}"

        - name: Keycloak | Get netbird-management client secret
          ansible.builtin.uri:
            url: "{{ keycloak_base_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ keycloak_mgmt_client_uuid }}/client-secret"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_mgmt_client_secret
          no_log: true

        - name: Set up Keycloak facts
          ansible.builtin.set_fact:
            netbird_auth_client_id: "netbird-client"
            netbird_idp_mgmt_client_id: "netbird-management"
            netbird_idp_mgmt_client_secret: "{{ keycloak_mgmt_client_secret.json.value }}"
            netbird_auth_authority: "{{ keycloak_base_url }}/realms/{{ keycloak_realm_name }}"
            netbird_auth_audience: "netbird-client"
            # Update finalized versions
            nb_auth_client_id: "netbird-client"
            nb_idp_mgmt_client_id: "netbird-management"
            nb_idp_mgmt_client_secret: "{{ keycloak_mgmt_client_secret.json.value }}"
            nb_auth_authority: "{{ keycloak_base_url }}/realms/{{ keycloak_realm_name }}"
            nb_auth_audience: "netbird-client"
      when: run_keycloak_config | bool


    # Task: Create the main deployment directory for NetBird.
    - name: Create NetBird deployment directory
      ansible.builtin.file:
        path: /opt/netbird
        state: directory
        mode: '0755'

    # Task: Generate the Caddyfile from its Jinja2 template.
    - name: Generate Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /opt/netbird/Caddyfile
        mode: '0644'
      tags: config

    # Task: Generate the docker-compose.yml file from its Jinja2 template.
    - name: Generate docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: /opt/netbird/docker-compose.yml
        mode: '0644'
      tags: config

    # Task: Generate the management.json file from its Jinja2 template.
    - name: Generate management.json
      ansible.builtin.template:
        src: templates/management.json.j2
        dest: /opt/netbird/management.json
        mode: '0644'
      tags: config

    # Task: Generate the turnserver.conf file from its Jinja2 template.
    - name: Generate turnserver.conf
      ansible.builtin.template:
        src: templates/turnserver.conf.j2
        dest: /opt/netbird/turnserver.conf
        mode: '0644'
      tags: config

    # Task: Start NetBird services using Docker Compose.
    - name: Start NetBird services with Docker Compose
      community.docker.docker_compose_v2:
        project_src: /opt/netbird
        state: present
        pull: always
        remove_orphans: true
      environment:
        NETBIRD_DOMAIN: "{{ netbird_domain }}"
        NETBIRD_CADDY_EMAIL: "{{ nb_caddy_email }}"
        NETBIRD_AUTH_AUDIENCE: "{{ nb_auth_audience }}"
        NETBIRD_AUTH_CLIENT_ID: "{{ nb_auth_client_id }}"
        NETBIRD_AUTH_AUTHORITY: "{{ nb_auth_authority }}"
        NETBIRD_IDP_MGMT_CLIENT_ID: "{{ nb_idp_mgmt_client_id }}"
        NETBIRD_IDP_MGMT_CLIENT_SECRET: "{{ nb_idp_mgmt_client_secret }}"
        NETBIRD_MANAGEMENT_SECRET: "{{ nb_management_secret }}"
        NETBIRD_RELAY_SECRET: "{{ nb_relay_secret }}"
        NETBIRD_TURN_SECRET: "{{ nb_turn_secret }}"
        NETBIRD_TURN_PASSWORD: "{{ nb_turn_password }}"
        NETBIRD_DATASTORE_ENCRYPTION_KEY: "{{ nb_datastore_encryption_key }}"
        KEYCLOAK_DOMAIN: "{{ keycloak_domain }}"
        NETBIRD_REALM: "{{ netbird_realm }}"
    - name: Cleanup | Stop and Remove NetBird Deployment
      tags: [never, cleanup]
      block:
        - name: Cleanup | Get admin token for Keycloak cleanup
          ansible.builtin.uri:
            url: "{{ (keycloak_auth_url | default('')) | trim | regex_replace('/+$', '') }}/realms/master/protocol/openid-connect/token"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            body_format: form-urlencoded
            body:
              username: "{{ keycloak_admin_user }}"
              password: "{{ keycloak_admin_password }}"
              grant_type: password
              client_id: admin-cli
            status_code: 200
          register: cleanup_token_response
          no_log: true
          ignore_errors: true

        - name: Cleanup | Delete NetBird realm in Keycloak
          ansible.builtin.uri:
            url: "{{ (keycloak_auth_url | default('')) | trim | regex_replace('/+$', '') }}/admin/realms/{{ netbird_realm | default('netbird') }}"
            method: DELETE
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ cleanup_token_response.json.access_token }}"
            status_code: [204, 404]
          when: cleanup_token_response.status == 200
          register: cleanup_realm_result
          failed_when: false

        - name: Cleanup | Stop NetBird services
          community.docker.docker_compose_v2:
            project_src: /opt/netbird
            state: absent
            remove_volumes: true
          register: cleanup_services_result
          failed_when: false

        - name: Cleanup | Remove any remaining NetBird volumes
          ansible.builtin.shell: |
            # Get all volumes that might be related to netbird
            VOLUMES=$(docker volume ls -q --filter name=netbird)
            if [ -n "$VOLUMES" ]; then
              echo "Removing volumes: $VOLUMES"
              docker volume rm $VOLUMES || true
            fi
            # Prune any anonymous volumes left over
            docker volume prune -f --filter "label=com.docker.compose.project=netbird" || true
          args:
            executable: /bin/bash
          register: cleanup_volumes_result
          failed_when: false
          changed_when: false

        - name: Cleanup | Remove deployment directory
          ansible.builtin.file:
            path: /opt/netbird
            state: absent
      tags: [never, cleanup]
