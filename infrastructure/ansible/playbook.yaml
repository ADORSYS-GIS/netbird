---
# Main Ansible playbook for deploying NetBird with Caddy as a reverse proxy.
# This playbook orchestrates the entire deployment process, including system preparation
# and the deployment of NetBird services with Caddy.

- name: Deploy NetBird with Caddy Reverse Proxy
  hosts: netbird_servers
  become: true
  gather_facts: true

  tasks:
    # Pre-flight Checklist: Install Docker if missing
    - name: Pre-flight | Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_installed
      ignore_errors: true
      changed_when: false

    - name: Pre-flight | Install Docker and dependencies
      block:
        - name: Install | Update apt cache
          ansible.builtin.apt:
            update_cache: true
          register: apt_update
          until: apt_update is success
          retries: 10
          delay: 10

        - name: Install | Install required packages
          ansible.builtin.apt:
            name:
              - apt-transport-https
              - ca-certificates
              - curl
              - gnupg
              - lsb-release
              - python3-pip
            state: present
          register: apt_install_req
          until: apt_install_req is success
          retries: 10
          delay: 10

        - name: Install | Add Docker GPG key
          ansible.builtin.apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present

        - name: Install | Add Docker repository
          ansible.builtin.apt_repository:
            repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
            state: present

        - name: Install | Install Docker Engine
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
            update_cache: true
          register: apt_install_docker
          until: apt_install_docker is success
          retries: 10
          delay: 10

        - name: Install | Ensure Docker service is started
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
      when: docker_installed.rc != 0

    - name: Pre-flight | Check if Docker is running
      ansible.builtin.shell: docker info
      register: docker_check
      changed_when: false
      failed_when: docker_check.rc != 0
      ignore_errors: false

    - name: Pre-flight | Check if Keycloak configuration is needed
      ansible.builtin.set_fact:
        run_keycloak_config: >-
          {{
            keycloak_auto_setup | default(true) and
            (netbird_idp_mgmt_client_secret == '<YOUR_IDP_MGMT_CLIENT_SECRET>' or netbird_idp_mgmt_client_secret == '') and
            not keycloak_domain.startswith('<YOUR_')
          }}

    - name: Pre-flight | Validate required variables
      ansible.builtin.assert:
        that:
          - netbird_domain is defined and not netbird_domain.startswith('<YOUR_')
          - (netbird_management_secret is defined and not netbird_management_secret.startswith('<YOUR_')) or (run_keycloak_config | bool)
          - (netbird_relay_secret is defined and not netbird_relay_secret.startswith('<YOUR_')) or (run_keycloak_config | bool)
          - (netbird_turn_secret is defined and not netbird_turn_secret.startswith('<YOUR_')) or (run_keycloak_config | bool)
          - (netbird_turn_password is defined and not netbird_turn_password.startswith('<YOUR_')) or (run_keycloak_config | bool)
          - (netbird_datastore_encryption_key is defined and not netbird_datastore_encryption_key.startswith('<YOUR_')) or (run_keycloak_config | bool)
        fail_msg: "One or more required variables are missing or contain placeholder values. Please check your vars.yml or GitHub Secrets."

    # Keycloak Configuration
    - name: Configure Keycloak realm and OAuth clients via API
      block:
        - name: Keycloak | Validate Keycloak admin credentials
          ansible.builtin.assert:
            that:
              - keycloak_admin_user is defined and not keycloak_admin_user.startswith('<YOUR_')
              - keycloak_admin_password is defined and not keycloak_admin_password.startswith('<YOUR_')
            fail_msg: "Keycloak admin credentials are required for automated setup but are missing or placeholders."

        - name: Keycloak | Get admin token
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            body_format: form-urlencoded
            body:
              username: "{{ keycloak_admin_user }}"
              password: "{{ keycloak_admin_password }}"
              grant_type: password
              client_id: admin-cli
            status_code: 200
          register: keycloak_admin_token_response
          no_log: true
          # Retrying in case Keycloak is still starting up
          until: keycloak_admin_token_response.status == 200
          retries: 5
          delay: 5

        - name: Keycloak | Set admin token fact
          ansible.builtin.set_fact:
            keycloak_admin_token: "{{ keycloak_admin_token_response.json.access_token }}"

        - name: Keycloak | Check if realm exists
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_realm_check
          failed_when: false
          changed_when: false

        - name: Keycloak | Create realm if it does not exist
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
            body_format: json
            body:
              realm: "{{ netbird_realm }}"
              enabled: true
              displayName: "NetBird"
            status_code: [201, 409] # 201 Created, 409 Conflict (already exists)
          when: keycloak_realm_check.status == 404

        - name: Keycloak | Check if netbird-client exists
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}/clients?clientId=netbird-client"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_netbird_client_check

        - name: Keycloak | Create netbird-client if it does not exist
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}/clients"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
            body_format: json
            body:
              clientId: "netbird-client"
              name: "NetBird Web Client"
              publicClient: true
              standardFlowEnabled: true
              redirectUris:
                - "https://{{ netbird_domain }}/*"
                - "http://localhost:53000/*"
              webOrigins:
                - "https://{{ netbird_domain }}"
                - "http://localhost:53000"
            status_code: [201, 409]
          when: keycloak_netbird_client_check.json | length == 0

        - name: Keycloak | Check if netbird-management client exists
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}/clients?clientId=netbird-management"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_mgmt_client_check

        - name: Keycloak | Create netbird-management client if it does not exist
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}/clients"
            method: POST
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
            body_format: json
            body:
              clientId: "netbird-management"
              name: "NetBird Management Service"
              serviceAccountsEnabled: true
              publicClient: false
            status_code: [201, 409]
          when: keycloak_mgmt_client_check.json | length == 0

        - name: Keycloak | Get netbird-management client UUID
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}/clients?clientId=netbird-management"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_mgmt_client_info
          retries: 5
          delay: 2
          until: "keycloak_mgmt_client_info.json | length > 0"

        - name: Keycloak | Set management client UUID fact
          ansible.builtin.set_fact:
            keycloak_mgmt_client_uuid: "{{ keycloak_mgmt_client_info.json[0].id }}"

        - name: Keycloak | Get netbird-management client secret
          ansible.builtin.uri:
            url: "{{ keycloak_auth_url }}/admin/realms/{{ netbird_realm }}/clients/{{ keycloak_mgmt_client_uuid }}/client-secret"
            method: GET
            validate_certs: "{{ keycloak_validate_certs }}"
            headers:
              Authorization: "Bearer {{ keycloak_admin_token }}"
          register: keycloak_mgmt_client_secret
          no_log: true

        - name: Set up Keycloak facts
          ansible.builtin.set_fact:
            netbird_auth_client_id: "netbird-client"
            netbird_idp_mgmt_client_id: "netbird-management"
            netbird_idp_mgmt_client_secret: "{{ keycloak_mgmt_client_secret.json.value }}"
            netbird_auth_authority: "{{ keycloak_auth_url }}/realms/{{ netbird_realm }}"
            netbird_auth_audience: "netbird-client"
      when: run_keycloak_config | bool


    # Task: Create the main deployment directory for NetBird.
    - name: Create NetBird deployment directory
      ansible.builtin.file:
        path: /opt/netbird
        state: directory
        mode: '0755'

    - name: Ensure key-netbird network exists
      community.docker.docker_network:
        name: key-netbird
        state: present

    # Task: Generate the Caddyfile from its Jinja2 template.
    - name: Generate Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /opt/netbird/Caddyfile
        mode: '0644'
      tags: config

    # Task: Generate the docker-compose.yml file from its Jinja2 template.
    - name: Generate docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: /opt/netbird/docker-compose.yml
        mode: '0644'
      tags: config

    # Task: Generate the management.json file from its Jinja2 template.
    - name: Generate management.json
      ansible.builtin.template:
        src: templates/management.json.j2
        dest: /opt/netbird/management.json
        mode: '0644'
      tags: config

    # Task: Generate the turnserver.conf file from its Jinja2 template.
    - name: Generate turnserver.conf
      ansible.builtin.template:
        src: templates/turnserver.conf.j2
        dest: /opt/netbird/turnserver.conf
        mode: '0644'
      tags: config

    # Task: Start NetBird services using Docker Compose.
    - name: Start NetBird services with Docker Compose
      community.docker.docker_compose_v2:
        project_src: /opt/netbird
        state: present
        pull: always
        remove_orphans: true
      environment:
        NETBIRD_DOMAIN: "{{ netbird_domain }}"
        NETBIRD_CADDY_EMAIL: "{{ netbird_caddy_email }}"
        NETBIRD_AUTH_AUDIENCE: "{{ netbird_auth_audience }}"
        NETBIRD_AUTH_CLIENT_ID: "{{ netbird_auth_client_id }}"
        NETBIRD_AUTH_AUTHORITY: "{{ netbird_auth_authority }}"
        NETBIRD_IDP_MGMT_CLIENT_ID: "{{ netbird_idp_mgmt_client_id }}"
        NETBIRD_IDP_MGMT_CLIENT_SECRET: "{{ netbird_idp_mgmt_client_secret }}"
        NETBIRD_MANAGEMENT_SECRET: "{{ netbird_management_secret }}"
        NETBIRD_RELAY_SECRET: "{{ netbird_relay_secret }}"
        NETBIRD_TURN_SECRET: "{{ netbird_turn_secret }}"
        NETBIRD_TURN_PASSWORD: "{{ netbird_turn_password }}"
        NETBIRD_DATASTORE_ENCRYPTION_KEY: "{{ netbird_datastore_encryption_key }}"
        KEYCLOAK_DOMAIN: "{{ keycloak_domain }}"
        NETBIRD_REALM: "{{ netbird_realm }}"