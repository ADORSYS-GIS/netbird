---
# Keycloak Configuration
keycloak_url: "https://keycloak.example.com"
keycloak_realm: "master"
keycloak_admin_user: "admin"
keycloak_admin_password: "admin_password"

# Netbird Configuration
netbird_mgmt_url: "https://netbird.example.com"
netbird_api_token: "YOUR_NETBIRD_API_TOKEN"

# Users to be added to Keycloak
netbird_users:
  - username: "jdoe"
    email: "jdoe@example.com"
    first_name: "John"
    last_name: "Doe"
    password: "TempPassword123!"
  - username: "asmith"
    email: "asmith@example.com"
    first_name: "Alice"
    last_name: "Smith"
    password: "TempPassword456!"

# Peer Enrollment Configuration
netbird_docker_enabled: false # Set to true for hosts that should run Netbird in Docker
netbird_version: "latest"

# Optional: Auto-assign groups to peers (can be overridden at host level)
# Use group IDs from Netbird Dashboard/API
netbird_auto_groups: [] 
