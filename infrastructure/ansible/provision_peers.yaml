---
- name: Provision NetBird API and Keycloak resources
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    # Keycloak integration for self-hosted
    keycloak_url: "{{ keycloak_auth_url | default('') }}"
    keycloak_admin_user: "{{ keycloak_admin_user | default('admin') }}"
    keycloak_admin_password: "{{ keycloak_admin_password | default('') }}"
    netbird_realm: "{{ netbird_realm | default('netbird') }}"
    netbird_management_url: "{{ lookup('env', 'NETBIRD_MANAGEMENT_URL') | default('https://' + netbird_domain, true) }}"
    netbird_api_token: "{{ lookup('env', 'NETBIRD_API_TOKEN') }}"
    netbird_user_name: "{{ target_user | default('default-user') }}"
  roles:
    - role: netbird_api

- name: Install and Register NetBird Peers
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  vars:
    netbird_setup_key: "{{ hostvars['localhost']['netbird_setup_key'] }}"
    netbird_management_url: "{{ hostvars['localhost']['netbird_management_url'] | default('https://' + netbird_domain, true) }}"
    netbird_docker_enabled: "{{ use_docker | default(false) }}"
  roles:
    - role: netbird_client
