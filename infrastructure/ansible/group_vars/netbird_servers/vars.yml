---
# NetBird Domain and Email
netbird_domain: "<YOUR_DOMAIN>"
netbird_caddy_email: "<YOUR_EMAIL>"
netbird_external_ip: "<YOUR_NETBIRD_EXTERNAL_IP>"

# Keycloak Configuration for Auto-Setup
keycloak_domain: "keycloak.{{ netbird_domain }}"
keycloak_port: "8080"
keycloak_admin_user: "admin"
keycloak_admin_password: "<YOUR_KEYCLOAK_ADMIN_PASSWORD>"
keycloak_auth_url: "https://{{ keycloak_domain }}"
keycloak_validate_certs: true

# NetBird Realm and IdP Settings
netbird_realm: "netbird"
idp_service_name: "keycloak"

# Default NetBird User (created during auto-setup)
netbird_default_user: "admin"
netbird_default_password: "<YOUR_DEFAULT_USER_PASSWORD>"

# Keycloak Auto-Setup Flag (set to false to skip Keycloak configuration)
keycloak_auto_setup: true

# OAuth Client Configuration (auto-filled by keycloak-setup.sh)
netbird_auth_client_id: "netbird-client"
netbird_auth_audience: "netbird-client"
netbird_auth_authority: "https://{{ keycloak_domain }}/realms/{{ netbird_realm }}"
netbird_idp_mgmt_client_id: "netbird-management"
netbird_idp_mgmt_client_secret: ""

# NetBird Service Secrets (Leave as-is for auto-generation)
netbird_management_secret: ""
netbird_relay_secret: ""
netbird_turn_secret: ""
netbird_turn_password: ""
netbird_datastore_encryption_key: ""
