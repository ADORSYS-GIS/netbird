---
# Keycloak Admin Credentials (for automatic realm and client setup)
vault_keycloak_admin_password: "<YOUR_KEYCLOAK_ADMIN_PASSWORD>"

# OAuth Client Credentials (auto-filled by keycloak-setup.sh)
vault_netbird_auth_client_id: "<YOUR_NETBIRD_CLIENT_ID>"
vault_netbird_idp_mgmt_client_id: "<Your idp management client id>"
vault_netbird_idp_mgmt_client_secret: "<Your idp management client secret>"

# NetBird Service Secrets (auto-generated by keycloak-setup.sh or manually set)
vault_netbird_management_secret: "<YOUR_SECRET>"
vault_netbird_relay_secret: "<YOUR_SECRET>"
vault_netbird_turn_secret: "<YOUR_SECRET>"
vault_netbird_turn_password: "<YOUR_SECRET>"
vault_netbird_datastore_encryption_key: "<YOUR_KEY>"