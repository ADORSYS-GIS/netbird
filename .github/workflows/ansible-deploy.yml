name: Ansible Deployment

# This workflow automates the deployment of NetBird using Ansible.
# It supports two deployment targets: Remote SSH and AWS SSM.
#
# REQUIRED GITHUB SECRETS:
# (See documentation in the repository for a full list of NetBird specific secrets)
#
# FOR 'aws_ssm': AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, AWS_INSTANCE_ID
# FOR 'ssh_remote': ANSIBLE_SSH_KEY, ANSIBLE_HOST, ANSIBLE_USER
# 
# KEYCLOAK AUTOMATION:
# KEYCLOAK_URL: URL of existing Keycloak instance (e.g., https://keycloak.example.com)
# KEYCLOAK_ADMIN_USER: Keycloak admin username (default: admin)
# KEYCLOAK_ADMIN_PASSWORD: Keycloak admin password

on:
  push:
    branches:
      - main
      - feature/ansible-netbird-deployment-pipeline
    paths:
      - 'infrastructure/ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Where to deploy NetBird'
        required: true
        default: 'ssh_remote'
        type: choice
        options:
          - ssh_remote
          - aws_ssm
      target_host:
        description: 'Target Host (for ssh_remote)'
        required: false
      target_user:
        description: 'SSH User (for ssh_remote)'
        required: false
        default: 'ubuntu'

jobs:
  deploy:
    name: Deploy NetBird
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: ${{ github.event.inputs.deployment_target || 'ssh_remote' }}
      KEYCLOAK_URL_SECRET: ${{ secrets.KEYCLOAK_URL }}
      KEYCLOAK_ADMIN_USER_SECRET: ${{ secrets.KEYCLOAK_ADMIN_USER || 'admin' }}
      KEYCLOAK_ADMIN_PASSWORD_SECRET: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ansible and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible botocore boto3

      - name: Install Ansible Collections
        run: |
          ansible-galaxy collection install community.docker
          ansible-galaxy collection install community.aws

      - name: Configure AWS Credentials
        if: env.DEPLOY_TARGET == 'aws_ssm'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS Session Manager Plugin
        if: env.DEPLOY_TARGET == 'aws_ssm'
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

      - name: Setup SSH
        if: env.DEPLOY_TARGET == 'ssh_remote'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_SSH_KEY }}

      - name: Configure Keycloak for NetBird
        if: env.KEYCLOAK_URL_SECRET != '' && env.KEYCLOAK_ADMIN_PASSWORD_SECRET != ''
        env:
          KEYCLOAK_URL: ${{ secrets.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ secrets.KEYCLOAK_ADMIN_USER || 'admin' }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          NETBIRD_DOMAIN: ${{ secrets.NETBIRD_DOMAIN }}
          NETBIRD_REALM: ${{ secrets.NETBIRD_REALM || 'netbird' }}
          OUTPUT_FORMAT: json
        run: |
          chmod +x infrastructure/scripts/keycloak-setup.sh
          infrastructure/scripts/keycloak-setup.sh > keycloak-output.json
          
          echo "Keycloak configuration completed"
          cat keycloak-output.json

      - name: Load Keycloak Configuration
        id: keycloak_config
        run: |
          if [ -s keycloak-output.json ] && jq '.' keycloak-output.json > /dev/null 2>&1; then
            echo "Using Keycloak automation output"
            echo "KEYCLOAK_AUTOMATED=true" >> $GITHUB_ENV
            
            # Extract values from JSON and ensure they are not empty
            {
              echo "KC_CLIENT_ID=$(jq -r '.netbird_client_id // empty' keycloak-output.json)"
              echo "KC_MGMT_CLIENT_ID=$(jq -r '.netbird_idp_mgmt_client_id // empty' keycloak-output.json)"
              echo "KC_MGMT_CLIENT_SECRET=$(jq -r '.netbird_idp_mgmt_client_secret // empty' keycloak-output.json)"
              echo "KC_MANAGEMENT_SECRET=$(jq -r '.netbird_management_secret // empty' keycloak-output.json)"
              echo "KC_RELAY_SECRET=$(jq -r '.netbird_relay_secret // empty' keycloak-output.json)"
              echo "KC_TURN_SECRET=$(jq -r '.netbird_turn_secret // empty' keycloak-output.json)"
              echo "KC_TURN_PASSWORD=$(jq -r '.netbird_turn_password // empty' keycloak-output.json)"
              echo "KC_DATASTORE_KEY=$(jq -r '.netbird_datastore_encryption_key // empty' keycloak-output.json)"
              echo "KC_REALM=$(jq -r '.netbird_realm // empty' keycloak-output.json)"
              echo "KC_DOMAIN=$(jq -r '.keycloak_domain // empty' keycloak-output.json)"
              echo "KC_AUTHORITY=$(jq -r '.netbird_auth_authority // empty' keycloak-output.json)"
            } >> $GITHUB_ENV
          else
            echo "Keycloak automation output missing or invalid. Falling back to GitHub Secrets."
            echo "KEYCLOAK_AUTOMATED=false" >> $GITHUB_ENV
          fi

      - name: Run Ansible Playbook
        env:
          # Targets
          TARGET_HOST: ${{ github.event.inputs.target_host || secrets.ANSIBLE_HOST }}
          TARGET_USER: ${{ github.event.inputs.target_user || secrets.ANSIBLE_USER || 'ubuntu' }}
          AWS_INSTANCE_ID: ${{ secrets.AWS_INSTANCE_ID }}
          # NetBird Vars
          NETBIRD_DOMAIN: ${{ secrets.NETBIRD_DOMAIN }}
          NETBIRD_CADDY_EMAIL: ${{ secrets.NETBIRD_CADDY_EMAIL }}
          NETBIRD_EXTERNAL_IP: ${{ secrets.NETBIRD_EXTERNAL_IP }}
          IDP_SERVICE_NAME: ${{ secrets.IDP_SERVICE_NAME || 'keycloak' }}
          KEYCLOAK_PORT: ${{ secrets.KEYCLOAK_PORT || '8080' }}
        run: |
          echo "[netbird_servers]" > inventory_gh.ini
          
          if [ "$DEPLOY_TARGET" == "aws_ssm" ]; then
            echo "netbird-primary ansible_host=$AWS_INSTANCE_ID ansible_connection=aws_ssm ansible_aws_ssm_region=${{ secrets.AWS_REGION }}" >> inventory_gh.ini
          else
            echo "netbird-primary ansible_host=$TARGET_HOST ansible_user=$TARGET_USER ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory_gh.ini
          fi
          
          # Build ansible-playbook command
          PLAYBOOK_CMD="ansible-playbook -i inventory_gh.ini infrastructure/ansible/playbook.yaml"
          
          # Add base extra-vars
          PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_domain=$NETBIRD_DOMAIN\""
          PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_caddy_email=$NETBIRD_CADDY_EMAIL\""
          PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_external_ip=$NETBIRD_EXTERNAL_IP\""
          PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"idp_service_name=$IDP_SERVICE_NAME\""
          PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"keycloak_port=$KEYCLOAK_PORT\""
          
          # Add Keycloak admin vars if provided
          [ -n "$KEYCLOAK_URL_SECRET" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"keycloak_auth_url=$KEYCLOAK_URL_SECRET\""
          [ -n "$KEYCLOAK_ADMIN_USER_SECRET" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"keycloak_admin_user=$KEYCLOAK_ADMIN_USER_SECRET\""
          [ -n "$KEYCLOAK_ADMIN_PASSWORD_SECRET" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"keycloak_admin_password=$KEYCLOAK_ADMIN_PASSWORD_SECRET\""
          
          # Add Keycloak-specific vars based on source
          if [ "$KEYCLOAK_AUTOMATED" = "true" ]; then
            echo "Using Keycloak automation values"
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_auth_client_id=$KC_CLIENT_ID\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_auth_audience=$KC_CLIENT_ID\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_idp_mgmt_client_id=$KC_MGMT_CLIENT_ID\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_idp_mgmt_client_secret=$KC_MGMT_CLIENT_SECRET\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_management_secret=$KC_MANAGEMENT_SECRET\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_relay_secret=$KC_RELAY_SECRET\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_turn_secret=$KC_TURN_SECRET\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_turn_password=$KC_TURN_PASSWORD\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_datastore_encryption_key=$KC_DATASTORE_KEY\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_realm=$KC_REALM\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"keycloak_domain=$KC_DOMAIN\""
            PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_auth_authority=$KC_AUTHORITY\""
          else
            echo "Using GitHub Secrets"
            # Only add if secrets are provided
            [ -n "${{ secrets.NETBIRD_AUTH_AUDIENCE }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_auth_audience=${{ secrets.NETBIRD_AUTH_AUDIENCE }}\""
            [ -n "${{ secrets.NETBIRD_AUTH_CLIENT_ID }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_auth_client_id=${{ secrets.NETBIRD_AUTH_CLIENT_ID }}\""
            [ -n "${{ secrets.NETBIRD_AUTH_AUTHORITY }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_auth_authority=${{ secrets.NETBIRD_AUTH_AUTHORITY }}\""
            [ -n "${{ secrets.NETBIRD_MANAGEMENT_SECRET }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_management_secret=${{ secrets.NETBIRD_MANAGEMENT_SECRET }}\""
            [ -n "${{ secrets.NETBIRD_RELAY_SECRET }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_relay_secret=${{ secrets.NETBIRD_RELAY_SECRET }}\""
            [ -n "${{ secrets.NETBIRD_TURN_SECRET }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_turn_secret=${{ secrets.NETBIRD_TURN_SECRET }}\""
            [ -n "${{ secrets.NETBIRD_TURN_PASSWORD }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_turn_password=${{ secrets.NETBIRD_TURN_PASSWORD }}\""
            [ -n "${{ secrets.NETBIRD_DATASTORE_ENCRYPTION_KEY }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_datastore_encryption_key=${{ secrets.NETBIRD_DATASTORE_ENCRYPTION_KEY }}\""
            [ -n "${{ secrets.NETBIRD_IDP_MGMT_CLIENT_ID }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_idp_mgmt_client_id=${{ secrets.NETBIRD_IDP_MGMT_CLIENT_ID }}\""
            [ -n "${{ secrets.KEYCLOAK_DOMAIN }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"keycloak_domain=${{ secrets.KEYCLOAK_DOMAIN }}\""
            [ -n "${{ secrets.NETBIRD_REALM }}" ] && PLAYBOOK_CMD="$PLAYBOOK_CMD --extra-vars \"netbird_realm=${{ secrets.NETBIRD_REALM }}\""
          fi
          # Execute the command
          eval $PLAYBOOK_CMD
