---
- name: Deploy Production NetBird Infrastructure
  hosts: all
  become: true
  roles:
    - common

- name: Deploy PgBouncer Connection Pooler (if enabled)
  hosts: management
  become: true
  roles:
    - role: pgbouncer
      when: enable_pgbouncer | default(false) | bool
  tags:
    - pgbouncer

- name: Deploy NetBird Management Servers
  hosts: management
  become: true
  roles:
    - netbird-management
    - netbird-signal
    - netbird-dashboard
    - netbird-coturn

- name: Deploy NetBird Relay Servers
  hosts: relay
  become: true
  roles:
    - netbird-relay

- name: Deploy Reverse Proxy & Load Balancer
  hosts: reverse_proxy
  become: true
  roles:
    - role: reverse-proxy
      when: proxy_type | default('haproxy') == 'caddy'
    - role: haproxy
      # HAProxy with ACME: Direct HTTPS termination + load balancing
      # No middleman = lower latency
      # Flow: Client (443) → HAProxy → Management Nodes
      when: proxy_type | default('haproxy') == 'haproxy'
