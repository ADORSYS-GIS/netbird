---
- name: Deploy Production NetBird Infrastructure
  hosts: all
  become: true
  roles:
    - common

- name: Deploy NetBird Management Servers
  hosts: management
  become: true
  roles:
    - netbird-management
    - netbird-signal
    - netbird-dashboard
    - netbird-coturn

- name: Deploy NetBird Relay Servers
  hosts: relay
  become: true
  roles:
    - netbird-relay

- name: Deploy Load Balancer
  hosts: reverse_proxy
  become: true
  roles:
    - role: reverse-proxy
      when: proxy_type | default('caddy') == 'caddy'
    - role: haproxy
      when: proxy_type | default('caddy') == 'haproxy'
