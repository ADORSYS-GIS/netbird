# =============================================================================
# CENTRALIZED ANSIBLE VARIABLES - ALL.YML
# =============================================================================
#
# This file contains ALL Ansible variables for NetBird deployment.
# Variables are sourced from terraform.tfvars and managed centrally.
# No role defaults should override these values.
#
# =============================================================================
# SECTION 1: CORE CONFIGURATION (FROM TERRAFORM)
# =============================================================================

# Domain configuration
netbird_domain: "{{ domain | default('netbird.example.com') }}"
environment: "{{ env | default('prod') }}"

# =============================================================================
# SECTION 2: VERSION CONFIGURATION (FROM TERRAFORM)
# =============================================================================

netbird_version: "{{ version | default('0.27.0') }}"
caddy_version: "{{ caddy_ver | default('2.8') }}"
haproxy_version: "{{ haproxy_ver | default('2.8') }}"
coturn_version: "{{ coturn_ver | default('4.6.2') }}"
docker_compose_version: "{{ dc_version | default('v2.24.0') }}"

# =============================================================================
# SECTION 3: DATABASE CONFIGURATION (FROM TERRAFORM)
# =============================================================================

database_type: "{{ db_type | default('sqlite') }}"
database_mode: "{{ db_mode | default('existing') }}"
enable_ha: "{{ ha_enabled | default(false) }}"

# SQLite configuration
sqlite_database_path: "/var/lib/netbird/store.db"

# PostgreSQL configuration
db_host: "{{ postgres_host | default('localhost') }}"
db_port: "{{ postgres_port | default(5432) }}"
db_name: "{{ postgres_db | default('netbird_db') }}"
db_user: "{{ postgres_user | default('netbird_user') }}"
db_password: "{{ postgres_password | default('') }}"
db_sslmode: "{{ postgres_sslmode | default('require') }}"

# =============================================================================
# SECTION 4: KEYCLOAK / IDENTITY PROVIDER (FROM TERRAFORM)
# =============================================================================

keycloak_url: "{{ kc_url | default('https://keycloak.example.com') }}"
keycloak_realm: "{{ kc_realm | default('netbird') }}"
keycloak_admin_username: "{{ kc_admin_user | default('admin') }}"
keycloak_admin_password: "{{ kc_admin_pass | default('') }}"
keycloak_client_id: "{{ kc_client_id | default('netbird') }}"
keycloak_client_secret: "{{ kc_client_secret | default('') }}"

# =============================================================================
# SECTION 5: NETBIRD SERVICE CONFIGURATION
# =============================================================================

# Management service
netbird_data_dir: "/var/lib/netbird"
netbird_config_dir: "/etc/netbird"
netbird_log_level: "{{ log_level | default('info') }}"

# Admin credentials
netbird_admin_email: "{{ admin_email | default('admin@example.com') }}"
netbird_admin_password: "{{ admin_password | default('') }}"

# Relay service
relay_auth_secret: "{{ relay_secret | default('') }}"
relay_domain: "{{ relay_domain_val | default(ansible_host) }}"

# Proxy configuration
proxy_type: "{{ proxy_mode | default('caddy') }}"

# =============================================================================
# SECTION 6: COTURN (STUN/TURN) CONFIGURATION
# =============================================================================

coturn_port: 3478
coturn_min_port: 49152
coturn_max_port: 65535
coturn_realm: "{{ netbird_domain }}"
coturn_password: "{{ coturn_pass | default('') }}"

# =============================================================================
# SECTION 7: PGBOUNCER CONFIGURATION
# =============================================================================

pgbouncer_state: "present"
pgbouncer_version: "{{ pgbouncer_ver | default('latest') }}"
pgbouncer_listen_address: "0.0.0.0"
pgbouncer_listen_port: "{{ pgbouncer_port | default(6432) }}"
pgbouncer_database_host: "{{ db_host }}"
pgbouncer_database_port: "{{ db_port }}"
pgbouncer_database_name: "{{ db_name }}"
pgbouncer_database_user: "{{ db_user }}"
pgbouncer_database_password: "{{ db_password }}"
pgbouncer_database_sslmode: "{{ db_sslmode }}"

# Pool sizing
pgbouncer_min_pool_size: "{{ pgbouncer_min_pool | default(10) }}"
pgbouncer_default_pool_size: "{{ pgbouncer_default_pool | default(25) }}"
pgbouncer_reserve_pool_size: "{{ pgbouncer_reserve_pool | default(5) }}"
pgbouncer_reserve_pool_timeout: 3
pgbouncer_pool_mode: "transaction"

# =============================================================================
# SECTION 8: HIGH AVAILABILITY (HA) CONFIGURATION
# =============================================================================

enable_clustering: "{{ clustering_enabled | default(false) }}"
netbird_cluster_port: "{{ cluster_port | default(9090) }}"
enable_pgbouncer: "{{ pgbouncer_enabled | default(false) }}"

# Secrets (must be permanent for HA)
netbird_encryption_key: "{{ encryption_key | default('') }}"

# =============================================================================
# SECTION 9: HAPROXY HEALTH CHECK CONFIGURATION
# =============================================================================

haproxy_health_check_interval: "{{ health_check_interval | default(5000) }}"
haproxy_health_check_timeout: "{{ health_check_timeout | default(3000) }}"
haproxy_health_check_fall: "{{ health_check_fall | default(2) }}"
haproxy_health_check_rise: "{{ health_check_rise | default(3) }}"
haproxy_stick_table_size: "{{ stick_table_size | default('100k') }}"
haproxy_stick_table_expire: "{{ stick_table_expire | default('30m') }}"

# =============================================================================
# SECTION 10: SSL/TLS CERTIFICATE CONFIGURATION
# =============================================================================

acme_provider: "{{ tls_provider | default('letsencrypt') }}"
acme_email: "{{ tls_email | default('admin@example.com') }}"

# =============================================================================
# SECTION 11: SSH / ANSIBLE CONFIGURATION
# =============================================================================

ansible_connection: "ssh"
ansible_user: "{{ ssh_user | default('ubuntu') }}"
ansible_ssh_private_key_file: "{{ ssh_key_path | default('~/.ssh/id_rsa') }}"
ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

# =============================================================================
# SECTION 12: DOCKER CONFIGURATION
# =============================================================================

docker_compose_dir: "/opt/netbird"
docker_network_name: "netbird-network"

# =============================================================================
# NOTES
# =============================================================================
#
# Variable Priority (in order):
# 1. Terraform-injected variables (highest priority)
# 2. This file (group_vars/all.yml)
# 3. Host-specific variables (if needed)
# 4. Role defaults (only if not overridden above)
#
# To use Terraform variables in Ansible:
# 1. Terraform provides them via terraform_inventory.yaml
# 2. This file reads them with {{ variable | default('fallback') }}
# 3. No role should define these variables
#
# =============================================================================
