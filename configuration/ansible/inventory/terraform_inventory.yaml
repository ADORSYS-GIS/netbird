all:
  vars:
    # NetBird Configuration
    netbird_domain: "netbird.observe.camer.digital"
    netbird_version: "latest"
    coturn_version: "latest"
    caddy_version: "2.11"
    haproxy_version: "3.2.0"
    proxy_type: "haproxy"
    acme_provider: "letsencrypt"
    acme_email: "admin@observe.camer.digital"
    docker_compose_version: "v5.0.2"
    netbird_log_level: "info"
    relay_auth_secret: "ea4a85c5b5e75f33acaa7ba87ddb240ca3bb47f4bc65143328bdd2dedba3d24a"
    netbird_encryption_key: "c7e3143dc04c0d8d6b7c00a6384852fae300618765612e257e5f94231b6458ee"
    coturn_password: "w{O+c1Ds@R&D9AJ=2OcFO:C<OojtptE4"
    coturn_port: 3478
    coturn_min_port: 49152
    coturn_max_port: 65535
    coturn_realm: "netbird.observe.camer.digital"

    # Paths
    netbird_data_dir: "/var/lib/netbird"
    netbird_config_dir: "/etc/netbird"

    # Database Configuration
    database_type: "postgresql"
    database_engine: "postgres"
    database_dsn: "host=ep-blue-recipe-aifgkckf-pooler.c-4.us-east-1.aws.neon.tech port=5432 dbname=neondb user=neondb_owner password=npg_qAHLUgk5hTw6 sslmode=require"
    database_endpoint: "ep-blue-recipe-aifgkckf-pooler.c-4.us-east-1.aws.neon.tech"
    db_host: "ep-blue-recipe-aifgkckf-pooler.c-4.us-east-1.aws.neon.tech"
    db_port: 5432
    db_name: "neondb"
    db_user: "neondb_owner"
    db_password: "npg_qAHLUgk5hTw6"
    db_sslmode: "require"
    sqlite_database_path: "/var/lib/netbird/store.db"

    # Keycloak Configuration
    keycloak_url: "https://keycloak.net.observe.camer.digital/auth"
    keycloak_realm: "netbird2"
    keycloak_client_id: "netbird-client"
    keycloak_backend_client_id: "netbird-backend"
    keycloak_backend_client_secret: "EZov8DA9G7p3Qz8I3VyTpLGJRC35UFAY"
    keycloak_oidc_endpoint: "https://keycloak.net.observe.camer.digital/auth/realms/netbird2/.well-known/openid-configuration"
    
    # HA Configuration
    enable_clustering: true
    netbird_cluster_port: 9090
    enable_pgbouncer: true
    
    # PgBouncer Configuration (ALL required variables)
    netbird_state: "present"
    pgbouncer_state: "present"
    pgbouncer_version: "latest"
    pgbouncer_listen_address: "0.0.0.0"
    pgbouncer_listen_port: 6432
    pgbouncer_database_name: "neondb"
    pgbouncer_database_host: "ep-blue-recipe-aifgkckf-pooler.c-4.us-east-1.aws.neon.tech"
    pgbouncer_database_port: 5432
    pgbouncer_database_user: "neondb_owner"
    pgbouncer_database_password: "npg_qAHLUgk5hTw6"
    pgbouncer_database_sslmode: "require"
    pgbouncer_min_pool_size: 10
    pgbouncer_default_pool_size: 25
    pgbouncer_reserve_pool_size: 5
    pgbouncer_reserve_pool_timeout: 3
    pgbouncer_pool_mode: "transaction"
    pgbouncer_server_lifetime: 3600
    pgbouncer_server_idle_timeout: 600
    pgbouncer_query_timeout: 0
    pgbouncer_query_wait_timeout: 120
    pgbouncer_client_idle_timeout: 0
    pgbouncer_max_client_conn: 1000
    pgbouncer_max_db_connections: 100
    pgbouncer_max_user_connections: 100
    pgbouncer_log_connections: "1"
    pgbouncer_log_disconnections: "1"
    pgbouncer_log_pooler_errors: "1"
    pgbouncer_stats_period: 60
    pgbouncer_health_check_period: 10
    pgbouncer_health_check_timeout: 5
    
    # HAProxy Configuration
    haproxy_health_check_interval: 5000
    haproxy_health_check_timeout: 3000
    haproxy_health_check_fall: 2
    haproxy_health_check_rise: 3
    haproxy_stick_table_size: "100k"
    haproxy_stick_table_expire: "30m"
    
    # Relay & STUN Addresses
    relay_addresses: ["rels://16.171.59.171:33080","rels://13.63.35.177:33080","rels://51.20.52.128:33080"]
    stun_addresses: ["stun:16.171.59.171:3478","stun:13.63.35.177:3478","stun:51.20.52.128:3478"]

    # Ansible Connection
    ansible_ssh_private_key_file: "~/.ssh/private_key"
    
  children:
    management:
      hosts:
        node-1:
          ansible_host: 16.171.59.171
          private_ip: 172.31.4.141
