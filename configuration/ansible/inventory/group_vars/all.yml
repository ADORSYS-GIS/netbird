---
# NetBird Ansible Configuration
# Global variables for all hosts

# ============================================================================
# NetBird Core Configuration
# ============================================================================

netbird_domain: "netbird.example.com"
netbird_caddy_email: "admin@example.com"

# ============================================================================
# Database Backend Configuration
# ============================================================================

# Database backend: "sqlite" (default) or "postgres"
netbird_database_backend: "sqlite"

# SQLite Configuration (when netbird_database_backend: "sqlite")
netbird_sqlite_datadir: "/var/lib/netbird"

# PostgreSQL Configuration (when netbird_database_backend: "postgres")
# Uncomment and configure when using PostgreSQL
# netbird_postgres_host: "postgres"
# netbird_postgres_port: 5432
# netbird_postgres_database: "netbird"
# netbird_postgres_user: "netbird"
# netbird_postgres_password: !vault |
#           $ANSIBLE_VAULT;1.1;AES256
#           ...encrypted...
# netbird_postgres_sslmode: "disable"  # Options: disable, require, verify-ca, verify-full

# ============================================================================
# NetBird Secrets (MUST be encrypted with ansible-vault)
# ============================================================================

# Management API secret
netbird_management_secret: "CHANGE_ME_RANDOM_SECRET_1"

# Relay secret
netbird_relay_secret: "CHANGE_ME_RANDOM_SECRET_2"

# CoTURN secret
netbird_turn_secret: "CHANGE_ME_RANDOM_SECRET_3"

# ============================================================================
# Authentication Configuration
# ============================================================================

# Authentication method: "none" (default), "oidc", or "auth0"
netbird_auth_method: "none"

# OIDC Configuration (when netbird_auth_method: "oidc")
# netbird_oidc_issuer: "https://keycloak.example.com/realms/netbird"
# netbird_oidc_client_id: "netbird"
# netbird_oidc_client_secret: !vault |
#           $ANSIBLE_VAULT;1.1;AES256
#           ...encrypted...

# ============================================================================
# Docker Configuration
# ============================================================================

docker_version: "latest"
docker_compose_version: "v2"

# ============================================================================
# Firewall Configuration
# ============================================================================

# UFW firewall rules
firewall_allowed_ports:
  - "22/tcp"    # SSH
  - "80/tcp"    # HTTP (Caddy)
  - "443/tcp"   # HTTPS (Caddy)
  - "3478/udp"  # STUN (CoTURN)
  - "3478/tcp"  # STUN (CoTURN)
  - "49152:65535/udp"  # TURN port range (CoTURN)

# ============================================================================
# System Configuration
# ============================================================================

# NTP configuration
ntp_enabled: true
ntp_timezone: "UTC"

# SSH hardening
ssh_disable_root_login: true
ssh_disable_password_auth: true
ssh_port: 22

# ============================================================================
# NetBird Container Images
# ============================================================================

netbird_images:
  caddy: "caddy:2-alpine"
  dashboard: "netbirdio/dashboard:latest"
  management: "netbirdio/management:latest"
  signal: "netbirdio/signal:latest"
  relay: "netbirdio/relay:latest"
  coturn: "coturn/coturn:4.6.2-alpine"
  postgres: "postgres:16-alpine"  # Only used when netbird_database_backend: "postgres"

# ============================================================================
# IMPORTANT: Encrypt this file before committing!
# ============================================================================
# Run: ansible-vault encrypt inventory/group_vars/all.yml
# Edit: ansible-vault edit inventory/group_vars/all.yml
# View: ansible-vault view inventory/group_vars/all.yml
# ============================================================================
