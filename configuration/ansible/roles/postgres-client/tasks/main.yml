---
- name: Install PostgreSQL client
  ansible.builtin.apt:
    name: postgresql-client
    state: present

- name: Verify database connection
  ansible.builtin.command: "psql '{{ postgres_dsn }}' -c '\\l'"
  register: db_check
  until: db_check.rc == 0
  retries: 5
  delay: 10
  changed_when: false
