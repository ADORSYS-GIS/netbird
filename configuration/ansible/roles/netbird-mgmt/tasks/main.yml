---
# NetBird management role entry point - deploys management server, signal, dashboard, and TURN

- name: Include cleanup tasks
  ansible.builtin.include_tasks: cleanup.yml
  when: (netbird_state | default('present') == 'absent') or ('cleanup' in ansible_run_tags) or ('cleanup-mgmt' in ansible_run_tags) or ('cleanup-management' in ansible_run_tags)

- name: Include deployment tasks
  ansible.builtin.include_tasks: deploy.yml
  when: netbird_state | default('present') == 'present'
