---
- name: Stop NetBird Dashboard container (Cleanup)
  community.docker.docker_container:
    name: netbird-dashboard
    state: absent
  when: netbird_state | default('present') == 'absent'

- name: Manage NetBird Dashboard ports (UFW)
  community.general.ufw:
    rule: allow
    delete: "{{ 'no' if netbird_state | default('present') == 'present' else 'yes' }}"
    port: '8082'
    proto: tcp
    comment: 'NetBird Dashboard'

- name: Start NetBird Dashboard container (Deploy)
  community.docker.docker_container:
    name: netbird-dashboard
    image: "netbirdio/dashboard:{{ netbird_version }}"
    state: started
    restart_policy: on-failure
    restart_retries: 5
    pull: true
    recreate: false
    networks:
      - name: netbird
    memory: "512m"
    memory_reservation: "256m"
    memory_swap: "512m"
    oom_killer: true
    env:
      NETBIRD_MGMT_API_ENDPOINT: "https://{{ netbird_domain }}"
      NETBIRD_MGMT_GRPC_API_ENDPOINT: "https://{{ netbird_domain }}"
      USE_AUTH0: "false"
      AUTH_AUDIENCE: "{{ keycloak_client_id }}"
      AUTH_CLIENT_ID: "{{ keycloak_client_id }}"
      AUTH_AUTHORITY: "{{ keycloak_url }}/realms/{{ keycloak_realm }}"
      AUTH_SUPPORTED_SCOPES: "openid profile email offline_access api"
      AUTH_REDIRECT_URI: "/nb-auth"
      AUTH_SILENT_REDIRECT_URI: "/nb-silent-auth"
      LETSENCRYPT_DOMAIN: "none"
      NETBIRD_TOKEN_SOURCE: "idToken"
      NGINX_SSL_PORT: "443"
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/" ]
      interval: "10s"
      timeout: "5s"
      retries: 3
      start_period: "60s"
    log_driver: "json-file"
    log_options:
      max-size: "100m"
      max-file: "5"
  when: netbird_state | default('present') == 'present'

- name: Force environment variable substitution in JS files
  ansible.builtin.shell: |
    docker exec netbird-dashboard sh -c '
    ENV_STR="\$USE_AUTH0 \$AUTH_AUDIENCE \$AUTH_AUTHORITY \$AUTH_CLIENT_ID \$AUTH_CLIENT_SECRET \$AUTH_SUPPORTED_SCOPES \$NETBIRD_MGMT_API_ENDPOINT \$NETBIRD_MGMT_GRPC_API_ENDPOINT \$NETBIRD_HOTJAR_TRACK_ID \$NETBIRD_GOOGLE_ANALYTICS_ID \$NETBIRD_GOOGLE_TAG_MANAGER_ID \$AUTH_REDIRECT_URI \$AUTH_SILENT_REDIRECT_URI \$NETBIRD_TOKEN_SOURCE \$NETBIRD_DRAG_QUERY_PARAMS \$NETBIRD_WASM_PATH"
    for f in $(grep -R -lE "NETBIRD_|AUTH_" /usr/share/nginx/html); do
        cp "$f" "$f".copy
        envsubst "$ENV_STR" < "$f".copy > "$f"
        rm "$f".copy
    done
    '
  register: dashboard_envsubst
  failed_when: dashboard_envsubst.rc not in [0, 1]
  changed_when: false
  when: netbird_state | default('present') == 'present'

