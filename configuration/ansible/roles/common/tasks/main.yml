---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - ufw
      - chrony
    state: present

# Include detailed firewall rules
- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml
