---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Set UFW default policies
  community.general.ufw:
    policy: deny
    direction: incoming
    state: enabled

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: 22
    proto: tcp

# Reverse Proxy Rules
- name: Allow HTTP/HTTPS on Reverse Proxy
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 80
    - 443
  when: "'reverse-proxy' in group_names"

- name: Allow STUN/TURN on Reverse Proxy (UDP)
  community.general.ufw:
    rule: allow
    port: 3478
    proto: udp
  when: "'reverse-proxy' in group_names"

# Management Node Rules
- name: Allow API/Signal (80) from Reverse Proxy
  community.general.ufw:
    rule: allow
    src: "{{ hostvars[item].ansible_default_ipv4.address }}"
    port: 80
    proto: tcp
  loop: "{{ groups['reverse-proxy'] | default([]) }}"
  when: "'management' in group_names"

- name: Allow Dashboard (8080) from Reverse Proxy
  community.general.ufw:
    rule: allow
    src: "{{ hostvars[item].ansible_default_ipv4.address }}"
    port: 8080
    proto: tcp
  loop: "{{ groups['reverse-proxy'] | default([]) }}"
  when: "'management' in group_names"

- name: Allow gRPC (10000) from Reverse Proxy
  community.general.ufw:
    rule: allow
    src: "{{ hostvars[item].ansible_default_ipv4.address }}"
    port: 10000
    proto: tcp
  loop: "{{ groups['reverse-proxy'] | default([]) }}"
  when: "'management' in group_names"
