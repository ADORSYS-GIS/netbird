---
- name: Create SQLite database directory
  file:
    path: "{{ sqlite_database_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Check if SQLite database exists
  stat:
    path: "{{ sqlite_database_path }}"
  register: sqlite_db_file

- name: Create empty SQLite database if not exists
  file:
    path: "{{ sqlite_database_path }}"
    state: touch
    owner: root
    group: root
    mode: '0644'
  when: not sqlite_db_file.stat.exists

- name: Install SQLite tools (Debian)
  apt:
    name: sqlite3
    state: present
  when: ansible_os_family == "Debian"
