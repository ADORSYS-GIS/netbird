---
- name: Install MySQL client (Debian/Ubuntu)
  apt:
    name:
      - default-mysql-client
    state: present
  when: ansible_os_family == "Debian"

# DSN format for NetBird is user:pass@tcp(host:port)/dbname?args
# We need to parse this for the mysql command line or use a python script
# For simplicity in shell, we'll try to extract args or assume we can just ping the host
- name: Test MySQL Host Reachability
  wait_for:
    host: "{{ database_endpoint }}"
    port: 3306
    timeout: 10
