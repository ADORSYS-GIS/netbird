---
- name: Stop NetBird Management container (Cleanup)
  community.docker.docker_container:
    name: netbird-management
    state: absent
  when: netbird_state | default('present') == 'absent'

- name: Manage NetBird directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: "{{ 'directory' if netbird_state | default('present') == 'present' else 'absent' }}"
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ netbird_data_dir }}"
    - "{{ netbird_config_dir }}"

- name: Manage NetBird configuration file
  ansible.builtin.template:
    src: management.json.j2
    dest: "{{ netbird_config_dir }}/management.json"
    owner: root
    group: root
    mode: '0600'
  notify: Restart NetBird Management
  when: netbird_state | default('present') == 'present'

- name: Manage NetBird Management ports (UFW)
  community.general.ufw:
    rule: allow
    delete: "{{ 'no' if netbird_state | default('present') == 'present' else 'yes' }}"
    port: "{{ item.port }}"
    proto: tcp
    comment: "{{ item.comment }}"
  loop:
    - { port: '8081', comment: 'NetBird Management API' }
    - { port: '10000', comment: 'NetBird gRPC' }
    - { port: '9000', comment: 'NetBird Management Health' }

- name: Start NetBird Management container (Deploy)
  community.docker.docker_container:
    name: netbird-management
    image: "netbirdio/management:{{ netbird_version }}"
    state: started
    restart_policy: on-failure
    restart_retries: 5
    pull: true
    recreate: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: "10s"
      timeout: "5s"
      retries: 3
      start_period: "30s"
    networks:
      - name: netbird
    ports:
      - "8081:80"
      - "10000:10000"
      - "9000:9000"
    memory: "2g"
    memory_reservation: "1g"
    memory_swap: "2g"
    oom_killer: true
    env:
      NETBIRD_STORE_ENGINE_POSTGRES_DSN: "{{ database_dsn if database_engine in ['postgres', 'postgresql'] else '' }}"
      NETBIRD_STORE_ENGINE_MYSQL_DSN: "{{ database_dsn if database_engine == 'mysql' else '' }}"
    volumes:
      - "{{ netbird_data_dir }}:/var/lib/netbird"
      - "{{ netbird_config_dir }}:/etc/netbird"
    command: ["--config", "/etc/netbird/management.json", "--log-file", "console"]
    log_driver: "json-file"
    log_options:
      max-size: "100m"
      max-file: "5"
  when: netbird_state | default('present') == 'present'
