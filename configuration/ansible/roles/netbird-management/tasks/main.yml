---
- name: Create NetBird directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ netbird_data_dir }}"
    - "{{ netbird_config_dir }}"

- name: Deploy NetBird Management configuration
  ansible.builtin.template:
    src: management.json.j2
    dest: "{{ netbird_config_dir }}/management.json"
    owner: root
    group: root
    mode: '0600'
  notify: Restart NetBird Management

- name: Allow NetBird Management ports (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: tcp
    comment: "{{ item.comment }}"
  loop:
    - { port: '8081', comment: 'NetBird Management API' }
    - { port: '10000', comment: 'NetBird gRPC' }
    - { port: '9000', comment: 'NetBird Management Health' }

- name: Run NetBird Management container
  community.docker.docker_container:
    name: netbird-management
    image: "netbirdio/management:{{ netbird_version }}"
    restart_policy: unless-stopped
    networks:
      - name: netbird
    ports:
      - "8081:80"
      - "10000:10000"
      - "9000:9000"
    volumes:
      - "{{ netbird_data_dir }}:/var/lib/netbird"
      - "{{ netbird_config_dir }}:/etc/netbird"
    command: ["--config", "/etc/netbird/management.json", "--log-file", "console"]
    log_driver: "json-file"
    log_options:
      max-size: "500m"
      max-file: "2"
