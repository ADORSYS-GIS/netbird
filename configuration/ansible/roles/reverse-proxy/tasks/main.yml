---
- name: Create Caddy directory
  ansible.builtin.file:
    path: /opt/caddy
    state: directory
    mode: '0755'

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /opt/caddy/Caddyfile
    mode: '0644'
  notify: Reload Caddy

- name: Run Caddy
  community.docker.docker_container:
    name: caddy
    image: caddy:latest
    state: started
    restart_policy: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3478:3478/udp"
    volumes:
      - /opt/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

- name: Reload Caddy
  ansible.builtin.command: docker exec caddy caddy reload --config /etc/caddy/Caddyfile
  changed_when: true
  when: false # Triggered by handler
