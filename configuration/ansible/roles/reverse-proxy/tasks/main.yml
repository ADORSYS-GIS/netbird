- name: Allow HTTP/HTTPS ports (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    comment: "NetBird Reverse Proxy"
  loop:
    - 80
    - 443

- name: Setup Caddy configuration
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
  notify: Reload Caddy

- name: Run Caddy Docker container
  community.docker.docker_container:
    name: caddy
    image: "caddy:{{ caddy_version | default('latest') }}"
    restart_policy: unless-stopped
    networks:
      - name: netbird
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

- name: Reload Caddy
  ansible.builtin.command: docker exec caddy caddy reload --config /etc/caddy/Caddyfile
  changed_when: true
  when: false # Triggered by handler
