---
- name: Allow Relay port (UFW)
  community.general.ufw:
    rule: allow
    port: '33080'
    proto: tcp
    comment: "NetBird Relay Service"

- name: Run NetBird Relay container
  community.docker.docker_container:
    name: netbird-relay
    image: "netbirdio/relay:{{ netbird_version }}"
    restart_policy: unless-stopped
    networks:
      - name: netbird
    env:
      NB_LOG_LEVEL: "{{ netbird_log_level }}"
      NB_LISTEN_ADDRESS: ":33080"
      NB_EXPOSED_ADDRESS: "rels://{{ relay_domain | default(ansible_host) }}:33080"
      NB_AUTH_SECRET: "{{ relay_auth_secret }}"
    ports:
      - "33080:33080"
    log_driver: "json-file"
    log_options:
      max-size: "500m"
      max-file: "2"
