---
# PgBouncer role entry point - connection pooler for PostgreSQL

- name: Include cleanup tasks
  ansible.builtin.include_tasks: cleanup.yml
  when: (pgbouncer_state | default('present') == 'absent') or ('cleanup' in ansible_run_tags) or ('cleanup-pgbouncer' in ansible_run_tags) or ('cleanup-database' in ansible_run_tags)

- name: Include deployment tasks
  ansible.builtin.include_tasks: deploy.yml
  when: pgbouncer_state | default('present') == 'present'
