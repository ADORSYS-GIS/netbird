---
- name: Stop NetBird Signal container (Cleanup)
  community.docker.docker_container:
    name: netbird-signal
    state: absent
  when: netbird_state | default('present') == 'absent'

- name: Manage NetBird Signal ports (UFW)
  community.general.ufw:
    rule: allow
    delete: "{{ 'no' if netbird_state | default('present') == 'present' else 'yes' }}"
    port: '8083'
    proto: tcp
    comment: 'NetBird Signal'

- name: Start NetBird Signal container (Deploy)
  community.docker.docker_container:
    name: netbird-signal
    image: "netbirdio/signal:{{ netbird_version }}"
    state: started
    restart_policy: on-failure
    restart_retries: 5
    pull: true
    recreate: false
    networks:
      - name: netbird
    ports:
      - "8083:80"
    memory: "1g"
    memory_reservation: "512m"
    memory_swap: "1g"
    oom_killer: true
    command: ["--port", "80"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: "10s"
      timeout: "5s"
      retries: 3
      start_period: "30s"
    log_driver: "json-file"
    log_options:
      max-size: "100m"
      max-file: "5"
  when: netbird_state | default('present') == 'present'
