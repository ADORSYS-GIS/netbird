---
- name: Create NetBird directory
  ansible.builtin.file:
    path: /opt/netbird
    state: directory
    mode: '0755'

- name: Create NetBird configuration directory
  ansible.builtin.file:
    path: /etc/netbird
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Determine config template based on engine
  ansible.builtin.set_fact:
    config_template: "config-{{ database_engine }}.yaml.j2"

- name: Deploy NetBird configuration
  ansible.builtin.template:
    src: "{{ config_template }}"
    dest: /etc/netbird/management.json
    owner: root
    group: root
    mode: '0600'
  notify: restart netbird

- name: Deploy docker-compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /etc/netbird/docker-compose.yml
    owner: root
    group: root
    mode: '0644'
  notify: restart netbird

- name: Start NetBird services
  community.docker.docker_compose_v2:
    project_src: /etc/netbird
    state: present
    pull: always
