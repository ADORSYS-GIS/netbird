---
- name: Manage HAProxy (Cleanup)
  community.docker.docker_container:
    name: haproxy
    state: absent
  when: netbird_state | default('present') == 'absent'

- name: Manage HAProxy configuration and cert directories
  ansible.builtin.file:
    path: \"{{ item }}\"
    state: \"{{ 'directory' if netbird_state | default('present') == 'present' else 'absent' }}\"
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/haproxy
    - /etc/haproxy/certs
    - /etc/haproxy/acme.sh
  when: netbird_state | default('present') == 'present'

- name: Install acme.sh
  ansible.builtin.shell: |
    curl https://get.acme.sh | sh -s email={{ acme_email }}
  args:
    creates: /root/.acme.sh/acme.sh
  when: netbird_state | default('present') == 'present'

- name: Issue SSL certificate with acme.sh
  ansible.builtin.shell: |
    /root/.acme.sh/acme.sh --issue -d {{ netbird_domain }} --standalone --httpport 80
  args:
    creates: \"/root/.acme.sh/{{ netbird_domain }}_ecc/fullchain.cer\"
  when: netbird_state | default('present') == 'present'
  register: acme_issue
  failed_when: false

- name: Combine cert and key for HAProxy
  ansible.builtin.shell: |
    cat /root/.acme.sh/{{ netbird_domain }}_ecc/{{ netbird_domain }}.cer /root/.acme.sh/{{ netbird_domain }}_ecc/{{ netbird_domain }}.key > /etc/haproxy/certs/{{ netbird_domain }}.pem
  when: netbird_state | default('present') == 'present'
  changed_when: acme_issue.changed

- name: Manage HAProxy configuration file
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: Restart HAProxy
  when: netbird_state | default('present') == 'present'

- name: Manage HAProxy Docker container
  community.docker.docker_container:
    name: haproxy
    image: \"haproxy:{{ haproxy_version | default('latest') }}\"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: netbird
    ports:
      - \"80:80\"
      - \"443:443\"
      - \"33073:33073\" # NetBird Management gRPC
    volumes:
      - /etc/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - /etc/haproxy/certs:/etc/haproxy/certs:ro
  notify: Restart HAProxy
  when: netbird_state | default('present') == 'present'

- name: Manage HTTP/HTTPS and gRPC ports (UFW)
  community.general.ufw:
    rule: allow
    delete: \"{{ 'no' if netbird_state | default('present') == 'present' else 'yes' }}\"
    port: \"{{ item }}\"
    proto: tcp
    comment: \"NetBird HAProxy Load Balancer\"
  loop:
    - 80
    - 443
    - 33073

- name: Remove HAProxy configuration directory
  ansible.builtin.file:
    path: /etc/haproxy
    state: absent
  when: netbird_state | default('present') == 'absent'
