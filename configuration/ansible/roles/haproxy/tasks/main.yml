---
# HAProxy role entry point - routes to cleanup or deployment based on state

- name: Include cleanup tasks
  ansible.builtin.include_tasks: cleanup.yml
  when: (netbird_state | default('present') == 'absent') or ('cleanup' in ansible_run_tags) or ('cleanup-haproxy' in ansible_run_tags) or ('cleanup-proxy' in ansible_run_tags)

- name: Include deployment tasks
  ansible.builtin.include_tasks: deploy.yml
  when: netbird_state | default('present') == 'present'
