---
- name: Detect existing rules
  ansible.builtin.include_tasks: detect-existing.yml

- name: Apply Load Balancer Rules
  ansible.builtin.include_tasks: loadbalancer.yml
  when: "'reverse_proxy' in group_names"

- name: Apply Management Rules
  ansible.builtin.include_tasks: management.yml
  when: "'management' in group_names"
