---
# NetBird role: Deploy NetBird stack with configurable database backend

- name: Create NetBird directory
  ansible.builtin.file:
    path: /opt/netbird
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /opt/netbird/Caddyfile
    mode: '0644'
  notify: Restart NetBird

- name: Template management.json with database configuration
  ansible.builtin.template:
    src: management.json.j2
    dest: /opt/netbird/management.json
    mode: '0644'
  notify: Restart NetBird

- name: Template turnserver.conf
  ansible.builtin.template:
    src: turnserver.conf.j2
    dest: /opt/netbird/turnserver.conf
    mode: '0644'
  notify: Restart NetBird

- name: Template docker-compose.yml with database backend logic
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/netbird/docker-compose.yml
    mode: '0644'
  notify: Restart NetBird

- name: Deploy NetBird stack
  community.docker.docker_compose_v2:
    project_src: /opt/netbird
    state: present
    pull: always
  register: netbird_deploy

- name: Wait for NetBird services to be healthy
  ansible.builtin.pause:
    seconds: 30
  when: netbird_deploy.changed

- name: Verify NetBird deployment
  community.docker.docker_container_info:
    name: netbird-management
  register: management_container
  failed_when: management_container.container.State.Status != "running"

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - "NetBird deployed successfully!"
      - "Domain: https://{{ netbird_domain }}"
      - "Database Backend: {{ netbird_database_backend }}"
      - "Management Container: {{ management_container.container.State.Status }}"
