---
# NetBird Deployment Playbook
# Deploy NetBird to servers discovered by Terraform

- name: Deploy NetBird to primary servers
  hosts: netbird_servers
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: [common, base]

    - role: docker
      tags: [docker]

    - role: netbird
      tags: [netbird]

  post_tasks:
    - name: Display deployment information
      ansible.builtin.debug:
        msg:
          - "NetBird deployment complete!"
          - "Access dashboard at: https://{{ netbird_domain }}"
          - "Database backend: {{ netbird_database_backend }}"
      tags: [always]

# Optional: Deploy relay servers (for scaling)
- name: Deploy NetBird relay servers
  hosts: netbird_relay_servers
  become: true
  gather_facts: true
  tags: [relay]

  roles:
    - role: common
      tags: [common, base]

    - role: docker
      tags: [docker]

  tasks:
    - name: Deploy relay-only configuration
      ansible.builtin.debug:
        msg: "Relay server deployment (to be implemented in HA Tier 2)"
